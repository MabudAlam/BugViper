steps:
  # Step 1: Build the Docker image — .env.production is copied into the image
  - name: "gcr.io/cloud-builders/docker"
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - "build"
      - "--no-cache"
      - "-t"
      - "us-central1-docker.pkg.dev/mealai-f58b5/bugviper/frontend-service:latest"
      - "-f"
      - "infra/docker/Dockerfile.frontend"
      - "."

  # Step 2: Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "us-central1-docker.pkg.dev/mealai-f58b5/bugviper/frontend-service:latest"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "frontend-service"
      - "--image"
      - "us-central1-docker.pkg.dev/mealai-f58b5/bugviper/frontend-service:latest"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"

images:
  - "us-central1-docker.pkg.dev/mealai-f58b5/bugviper/frontend-service:latest"

options:
  logging: CLOUD_LOGGING_ONLY
