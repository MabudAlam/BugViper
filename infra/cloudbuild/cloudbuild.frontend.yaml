steps:
  # Step 1: Build the Docker image — NEXT_PUBLIC_* vars are inlined at build time
  - name: "gcr.io/cloud-builders/docker"
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - "build"
      - "--no-cache"
      - "-t"
      - "us-central1-docker.pkg.dev/mealai-f58b5/bugviper/frontend-service:latest"
      - "-f"
      - "infra/docker/Dockerfile.frontend"
      - "--build-arg"
      - "NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}"
      - "."

  # Step 2: Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "us-central1-docker.pkg.dev/mealai-f58b5/bugviper/frontend-service:latest"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "frontend-service"
      - "--image"
      - "us-central1-docker.pkg.dev/mealai-f58b5/bugviper/frontend-service:latest"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"

images:
  - "us-central1-docker.pkg.dev/mealai-f58b5/bugviper/frontend-service:latest"

substitutions:
  _NEXT_PUBLIC_API_URL: "https://api-service-760266971868.us-central1.run.app"
  _NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyCD964AoX_VoFcfWUeyRfkhgFJwPp2kCB4"
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "mealai-f58b5.firebaseapp.com"
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: "mealai-f58b5"
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "mealai-f58b5.firebasestorage.app"
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "760266971868"
  _NEXT_PUBLIC_FIREBASE_APP_ID: "1:760266971868:web:05e8fea3e7ced1baed7219"

options:
  logging: CLOUD_LOGGING_ONLY
