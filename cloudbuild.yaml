# ── BugViper CI/CD ────────────────────────────────────────────────────────────
# Builds and deploys all 5 services to Cloud Run.
# Runs all Docker builds in parallel for speed.

substitutions:
  _REGION: us-central1
  _ARTIFACT_REGISTRY: us-central1-docker.pkg.dev/mealai-f58b5/bugviper
  _NEXT_PUBLIC_API_URL: https://api-service-760266971868.us-central1.run.app
  _NEXT_PUBLIC_FIREBASE_API_KEY: ${_NEXT_PUBLIC_FIREBASE_API_KEY}
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
  _NEXT_PUBLIC_FIREBASE_APP_ID: ${_NEXT_PUBLIC_FIREBASE_APP_ID}

steps:
  # ── Build all Docker images in parallel ──────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-api"
    env: ["DOCKER_BUILDKIT=1"]
    args: ["build", "--no-cache", "-t", "${_ARTIFACT_REGISTRY}/api-service:latest",
           "-f", "infra/docker/Dockerfile.api", "."]

  - name: "gcr.io/cloud-builders/docker"
    id: "build-review"
    env: ["DOCKER_BUILDKIT=1"]
    args: ["build", "--no-cache", "-t", "${_ARTIFACT_REGISTRY}/review-service:latest",
           "-f", "infra/docker/Dockerfile.review", "."]

  - name: "gcr.io/cloud-builders/docker"
    id: "build-ingestion"
    env: ["DOCKER_BUILDKIT=1"]
    args: ["build", "--no-cache", "-t", "${_ARTIFACT_REGISTRY}/ingestion-service:latest",
           "-f", "infra/docker/Dockerfile.ingestion", "."]

  - name: "gcr.io/cloud-builders/docker"
    id: "build-lint"
    env: ["DOCKER_BUILDKIT=1"]
    args: ["build", "--no-cache", "-t", "${_ARTIFACT_REGISTRY}/lint-service:latest",
           "-f", "infra/docker/Dockerfile.lint", "."]

  - name: "gcr.io/cloud-builders/docker"
    id: "build-frontend"
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - "build"
      - "--no-cache"
      - "-t"
      - "${_ARTIFACT_REGISTRY}/frontend-service:latest"
      - "-f"
      - "infra/docker/Dockerfile.frontend"
      - "--build-arg"
      - "NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}"
      - "."

  # ── Push all images in parallel ───────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-api"
    wait: ["build-api"]
    args: ["push", "${_ARTIFACT_REGISTRY}/api-service:latest"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-review"
    wait: ["build-review"]
    args: ["push", "${_ARTIFACT_REGISTRY}/review-service:latest"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-ingestion"
    wait: ["build-ingestion"]
    args: ["push", "${_ARTIFACT_REGISTRY}/ingestion-service:latest"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-lint"
    wait: ["build-lint"]
    args: ["push", "${_ARTIFACT_REGISTRY}/lint-service:latest"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-frontend"
    wait: ["build-frontend"]
    args: ["push", "${_ARTIFACT_REGISTRY}/frontend-service:latest"]

  # ── Deploy all services to Cloud Run in parallel ────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-api"
    wait: ["push-api"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - api-service
      - --image
      - "${_ARTIFACT_REGISTRY}/api-service:latest"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --allow-unauthenticated
      - --timeout
      - "300s"
      - --concurrency
      - "100"
      - --cpu
      - "1"
      - --memory
      - "1Gi"
      - --min-instances
      - "1"
      - --max-instances
      - "10"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-review"
    wait: ["push-review"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - review-service
      - --image
      - "${_ARTIFACT_REGISTRY}/review-service:latest"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --no-allow-unauthenticated
      - --timeout
      - "1800s"
      - --concurrency
      - "4"
      - --cpu
      - "2"
      - --memory
      - "2Gi"
      - --no-cpu-throttling
      - --min-instances
      - "0"
      - --max-instances
      - "10"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-ingestion"
    wait: ["push-ingestion"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ingestion-service
      - --image
      - "${_ARTIFACT_REGISTRY}/ingestion-service:latest"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --allow-unauthenticated
      - --timeout
      - "300s"
      - --concurrency
      - "20"
      - --cpu
      - "1"
      - --memory
      - "1Gi"
      - --min-instances
      - "1"
      - --max-instances
      - "5"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-lint"
    wait: ["push-lint"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - lint-service
      - --image
      - "${_ARTIFACT_REGISTRY}/lint-service:latest"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --no-allow-unauthenticated
      - --timeout
      - "120s"
      - --concurrency
      - "20"
      - --cpu
      - "2"
      - --memory
      - "2Gi"
      - --no-cpu-throttling
      - --min-instances
      - "0"
      - --max-instances
      - "10"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-frontend"
    wait: ["push-frontend"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - frontend-service
      - --image
      - "${_ARTIFACT_REGISTRY}/frontend-service:latest"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --allow-unauthenticated
      - --timeout
      - "30s"
      - --concurrency
      - "1000"
      - --min-instances
      - "1"
      - --max-instances
      - "10"

images:
  - "${_ARTIFACT_REGISTRY}/api-service:latest"
  - "${_ARTIFACT_REGISTRY}/review-service:latest"
  - "${_ARTIFACT_REGISTRY}/ingestion-service:latest"
  - "${_ARTIFACT_REGISTRY}/lint-service:latest"
  - "${_ARTIFACT_REGISTRY}/frontend-service:latest"

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 3600s
